# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.0a2"
  cov_fail_under: "65"
  pytest_skip: test_code_actions or test_completion or test_diagnostics or test_inline_value or test_progress or test_request_error_reporting

recipe:
  name: pygls
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/pygls/pygls-${{ version }}.tar.gz
    sha256: 03e00634ed8d989918268aaa4b4a0c3ab857ea2d4ee94514a52efa5ddd6d5d9f
    target_directory: dist
  - url: https://github.com/openlawlibrary/pygls/archive/refs/tags/v${{ version }}.tar.gz
    sha256: d2dc2b8e298cac8d3945b237cff1f103b0bf6349f0308361b0041dcdae59ab2f
    target_directory: src

build:
  number: 0
  noarch: python

outputs:
  - package:
      name: pygls
    build:
      noarch: python
      script:
        - cd dist
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
    requirements:
      host:
        - pip
        - python ${{ python_min }}.*
        - poetry-core
      run:
        - python >=${{ python_min }}
        - cattrs >=23.1.2
        - lsprotocol ==2024.0.0b1
    tests:
      - python:
          imports: pygls
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - 3.13.*
  - package:
      name: pygls-with-ws
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage("pygls", exact=True) }}
        - websockets >=13
    tests:
      - python:
          imports: pygls
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - 3.13.*
      - files:
          source:
            - src/tests
        requirements:
          run:
            - coverage
            - pip
            - pytest <8
            - pytest-asyncio
            - pytest-timeout
            - python ${{ python_min }}
        script:
          - pip check
          - cd src
          - pytest --color=yes --collect-only -k "not (${{ pytest_skip }})"
          - coverage run --source=pygls --parallel --branch -m pytest -ra -vv --color=yes --timeout=20 --asyncio-mode=auto -k "not (${{ pytest_skip }})"
          - coverage combine
          - coverage report --show-missing --skip-covered --fail-under=${{ cov_fail_under }}

about:
  license: Apache-2.0
  license_file:
    - dist/LICENSE.txt
    - src/ThirdPartyNotices.txt
  summary: a pythonic generic language server (pronounced like "pie glass").
  homepage: https://pygls.readthedocs.io
  repository: https://github.com/openlawlibrary/pygls
  documentation: https://pygls.readthedocs.io
  description: |
    pygls (pronounced like "pie glass") is a pythonic generic implementation of
    the Language Server Protocol for use as a foundation for writing language
    servers using Python (e.g. Python, XML, etc.). It allows you to write your
    own language server in just a few lines of code.

extra:
  feedstock-name: pygls
  recipe-maintainers:
    - bollwyvl
